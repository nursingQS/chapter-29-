<script>
    // Chapter 29: Management of Patients with Nonmalignant Hematologic Disorders – 35 questions (exact from document)
    const questions = [
        {
            id: 1,
            question: "1. A client with sickle cell disease is taking narcotic analgesics for pain control. Which intervention by the nurse would decrease the risk for narcotic substance abuse?",
            options: [
                "A. Encourage the client to rely on complementary and alternative therapies.",
                "B. Encourage the client to seek care from a single provider for pain relief.",
                "C. Teach the client to accept chronic pain as an inevitable aspect of the disease.",
                "D. Limit the reporting of emergency department visits to the primary health care provider."
            ],
            correct: 1, // B
            rationale: "The client should be encouraged to use a single primary provider to address health care concerns. Emergency department visits should be reported to the primary provider to achieve optimal management of the disease. It would be inappropriate to teach the client to simply accept the pain. Complementary therapies are usually insufficient to fully address pain in sickle cell disease. (PTS:1 REF:p.925)"
        },
        {
            id: 2,
            question: "2. A client newly diagnosed with thrombocytopenia is admitted to the medical unit. After the admission assessment, the client asks the nurse to explain the condition. The nurse explains to this client that this condition occurs due to which factor?",
            options: [
                "A. An attack on the platelets by antibodies",
                "B. Decreased production of platelets",
                "C. Impaired communication between platelets",
                "D. An autoimmune process causing platelet malfunction"
            ],
            correct: 1, // B
            rationale: "Thrombocytopenia can result from a decreased platelet production, increased platelet destruction, or increased consumption of platelets. Impaired platelet communication, antibodies, and autoimmune processes are not typical pathologies. (PTS:1 REF:p.932)"
        },
        {
            id: 3,
            question: "3. A critical care nurse is caring for a client with immune hemolytic anemia. The client is not responding to conservative treatments, and the client's condition is now becoming life-threatening. The nurse is aware that a treatment option in this case may include which intervention?",
            options: [
                "A. Hepatectomy",
                "B. Vitamin K administration",
                "C. Platelet transfusion",
                "D. Splenectomy"
            ],
            correct: 3, // D
            rationale: "A splenectomy may be the course of treatment if autoimmune hemolytic anemia does not respond to conservative treatment. Vitamin K administration is treatment for vitamin K deficiency and does not resolve anemia. Platelet transfusion may be the course of treatment for some bleeding disorders. Hepatectomy would not help the client. (PTS:1 REF:p.927)"
        },
        {
            id: 4,
            question: "4. A nurse is providing education to a client with iron deficiency anemia who has been prescribed iron supplements. What should the nurse include in health education?",
            options: [
                "A. Take the iron with dairy products to enhance absorption.",
                "B. Increase the intake of vitamin E to enhance absorption.",
                "C. Iron will cause the stools to darken in color.",
                "D. Limit foods high in fiber due to the risk for diarrhea."
            ],
            correct: 2, // C
            rationale: "The nurse will inform the client that iron will cause the stools to become dark in color. Iron should be taken on an empty stomach, as its absorption is affected by food, especially dairy products. Clients should be instructed to increase their intake of vitamin C to enhance iron absorption. Foods high in fiber should be consumed to minimize problems with constipation, a common side effect associated with iron therapy. (PTS:1 REF:p.915)"
        },
        {
            id: 5,
            question: "5. The nurse is assessing a new client with reports of acute fatigue and a sore tongue that is visibly smooth and beefy red. This client is demonstrating signs and symptoms associated with what form of hematologic disorder?",
            options: [
                "A. Sickle cell disease",
                "B. Hemophilia",
                "C. Megaloblastic anemia",
                "D. Thrombocytopenia"
            ],
            correct: 2, // C
            rationale: "A red, smooth, sore tongue is a symptom associated with megaloblastic anemia. Sickle cell disease, hemophilia, and thrombocytopenia do not have symptoms involving the tongue. (PTS:1 REF:p.912)"
        },
        {
            id: 6,
            question: "6. A client with acute kidney injury has decreased erythropoietin production. Upon analysis of the client's complete blood count, the nurse will expect which of the following results?",
            options: [
                "A. An increased hemoglobin and decreased hematocrit",
                "B. A decreased hemoglobin and hematocrit",
                "C. A decreased mean corpuscular volume (MCV) and red cell distribution width (RDW)",
                "D. An increased mean corpuscular volume (MCV) and red cell distribution width (RDW)"
            ],
            correct: 1, // B
            rationale: "The decreased production of erythropoietin will result in a decreased hemoglobin and hematocrit. The client will have normal MCV and RDW because the erythrocytes are normal in appearance. (PTS:1 REF:p.915)"
        },
        {
            id: 7,
            question: "7. A client comes to the clinic reporting fatigue and the health interview is suggestive of pica. Laboratory findings reveal a low serum iron level and a low ferritin level. With what would the nurse suspect that the client will be diagnosed?",
            options: [
                "A. Iron deficiency anemia",
                "B. Pernicious anemia",
                "C. Sickle cell disease",
                "D. Hemolytic anemia"
            ],
            correct: 0, // A
            rationale: "A low serum iron level, a low ferritin level, and symptoms of pica are associated with iron deficiency anemia. TIBC may also be elevated. None of the other anemias are associated with pica. (PTS:1 REF:p.914)"
        },
        {
            id: 8,
            question: "8. A client comes into the clinic reporting fatigue. Blood work shows an increased bilirubin concentration and an increased reticulocyte count. Which condition should the nurse most suspect the client has?",
            options: [
                "A. A hypoproliferative anemia",
                "B. A leukemia",
                "C. Thrombocytopenia",
                "D. A hemolytic anemia"
            ],
            correct: 3, // D
            rationale: "In hemolytic anemias, premature destruction of erythrocytes results in the liberation of hemoglobin from the erythrocytes into the plasma; the released hemoglobin is converted in large part to bilirubin, and therefore the bilirubin concentration rises. The increased erythrocyte destruction leads to tissue hypoxia, which in turn stimulates erythropoietin production. This increased production is reflected in an increased reticulocyte count as the bone marrow responds to the loss of erythrocytes. Hypoproliferative anemias, leukemia, and thrombocytopenia lack this pathology and presentation. (PTS:1 REF:p.911)"
        },
        {
            id: 9,
            question: "9. A client is admitted to the hospital with pernicious anemia. The nurse should prepare to administer which of the following medications?",
            options: [
                "A. Folic acid",
                "B. Vitamin B12",
                "C. Lactulose",
                "D. Magnesium sulfate"
            ],
            correct: 1, // B
            rationale: "Pernicious anemia is characterized by vitamin B12 deficiency. Magnesium sulfate, lactulose, and folic acid do not address the pathology of this type of anemia. (PTS:1 REF:p.918)"
        },
        {
            id: 10,
            question: "10. A client's blood work reveals a platelet level of 17,000/mm3. When inspecting the client's integumentary system, what finding would be most consistent with this platelet level?",
            options: [
                "A. Dermatitis",
                "B. Petechiae",
                "C. Urticaria",
                "D. Alopecia"
            ],
            correct: 1, // B
            rationale: "When the platelet count drops to less than 20,000/mm3, petechiae can appear. Low platelet levels do not normally result in dermatitis, urticaria (hives), or alopecia (hair loss). (PTS:1 REF:p.931)"
        },
        {
            id: 11,
            question: "11. A nurse is admitting a client with immune thrombocytopenic purpura to the unit. In completing the admission assessment, the nurse must be alert for what medications that potentially alter platelet function? Select all that apply.",
            options: [
                "A. Antihypertensives",
                "B. Penicillins",
                "C. Sulfa-containing medications",
                "D. Aspirin-based drugs",
                "E. NSAIDs"
            ],
            correct: [2,3,4], // C, D, E
            rationale: "The nurse must be alert for sulfa-containing medications and others that alter platelet function (e.g., aspirin-based or other NSAIDs). Antihypertensive drugs and the penicillins do not alter platelet function. (PTS:1 REF:p.934)"
        },
        {
            id: 12,
            question: "12. A 25-year-old client comes to the emergency department with excessive bleeding from a cut sustained when cleaning a knife. Blood work shows a prolonged prothrombin time (PT), but a vitamin K deficiency is ruled out. When assessing the client, areas of ecchymosis are noted on other areas of the body. Which of the following is the most plausible cause of the client's signs and symptoms?",
            options: [
                "A. Lymphoma",
                "B. Leukemia",
                "C. Hemophilia",
                "D. Hepatic dysfunction"
            ],
            correct: 3, // D
            rationale: "Prolongation of the PT, unless it is caused by vitamin K deficiency, may indicate severe hepatic dysfunction. Liver dysfunction can lead to decreased amount of factors needed for coagulation and hemostasis. The majority of hemophiliacs are diagnosed as children. The scenario does not describe signs or symptoms of lymphoma or leukemia. (PTS:1 REF:p.939)"
        },
        {
            id: 13,
            question: "13. A client with a history of cirrhosis is admitted to the ICU with a diagnosis of bleeding esophageal varices; an attempt to stop the bleeding has been only partially successful. What would the critical care nurse expect the care team to prescribe for this client?",
            options: [
                "A. Packed red blood cells (PRBCs)",
                "B. Vitamin K",
                "C. Oral anticoagulants",
                "D. Heparin infusion"
            ],
            correct: 0, // A
            rationale: "Clients with liver dysfunction may have life-threatening hemorrhage from peptic ulcers or esophageal varices. In these cases, replacement with fresh-frozen plasma, PRBCs, and platelets is usually required. Vitamin K may be prescribed once the bleeding is stopped, but that is not what is needed to stop the bleeding of the varices. Anticoagulants would exacerbate the client's bleeding. (PTS:1 REF:p.939)"
        },
        {
            id: 14,
            question: "14. The nurse on the pediatric unit is caring for a 10-year-old child with a diagnosis of hemophilia. The nurse should assess carefully for indication of what nursing diagnosis?",
            options: [
                "A. Hypothermia",
                "B. Diarrhea",
                "C. Ineffective coping",
                "D. Imbalanced nutrition: Less than body requirements"
            ],
            correct: 2, // C
            rationale: "Most clients with hemophilia are diagnosed as children. They often require assistance in coping with the condition because it is chronic, places restrictions on their lives, and is an inherited disorder that can be passed to future generations. Children with hemophilia are not at risk of hypothermia, diarrhea, or imbalanced nutrition. (PTS:1 REF:p.937)"
        },
        {
            id: 15,
            question: "15. A group of nurses are learning about the high incidence and prevalence of anemia among different populations. Which individual is most likely to have anemia?",
            options: [
                "A. A 50-year-old black woman who is going through menopause",
                "B. An 81-year-old woman who has chronic heart failure",
                "C. A 48-year-old man who travels extensively and has a high-stress job",
                "D. A 13-year-old girl who has just experienced menarche"
            ],
            correct: 1, // B
            rationale: "The incidence and prevalence of anemia are exceptionally high among older adults, and the risk of anemia is compounded by the presence of heart disease. None of the other listed individuals exhibits high-risk factors for anemia, though exceptionally heavy menstrual flow can result in anemia. (PTS:1 REF:p.911)"
        },
        {
            id: 16,
            question: "16. An adult client has been diagnosed with iron-deficiency anemia. What nursing diagnosis is most likely to apply to this client's health status?",
            options: [
                "A. Risk for deficient fluid volume related to impaired erythropoiesis",
                "B. Risk for infection related to tissue hypoxia",
                "C. Acute pain related to uncontrolled hemolysis",
                "D. Fatigue related to decreased oxygen-carrying capacity"
            ],
            correct: 3, // D
            rationale: "Fatigue is the major assessment finding common to all forms of anemia. Anemia does not normally result in acute pain or fluid deficit. The client may have an increased risk of infection due to impaired immune function, but fatigue is more likely. (PTS:1 REF:p.912)"
        },
        {
            id: 17,
            question: "17. A client has been living with a diagnosis of anemia for several years and has experienced recent declines in hemoglobin levels despite active treatment. Which assessment finding would signal complications of anemia?",
            options: [
                "A. Venous ulcers and visual disturbances",
                "B. Fever and signs of hyperkalemia",
                "C. Epistaxis and gastroesophageal reflux",
                "D. Shortness of breath and peripheral edema"
            ],
            correct: 3, // D
            rationale: "A significant complication of anemia is heart failure from chronic diminished blood volume and the heart's compensatory effort to increase cardiac output. Clients with anemia should be assessed for signs and symptoms of heart failure, including dyspnea and peripheral edema. None of the other listed signs and symptoms is characteristic of heart failure. (PTS:1 REF:p.912)"
        },
        {
            id: 18,
            question: "18. A woman who is in her third trimester of pregnancy has been experiencing an exacerbation of iron-deficiency anemia in recent weeks. When providing the client with nutritional guidelines and meal suggestions, what foods would be most likely to increase the woman's iron stores?",
            options: [
                "A. Salmon accompanied by whole milk",
                "B. Mixed vegetables and brown rice",
                "C. Beef liver accompanied by orange juice",
                "D. Yogurt, almonds, and whole grain oats"
            ],
            correct: 2, // C
            rationale: "Food sources high in iron include organ meats, other meats, beans (e.g., black and pinto), leafy green vegetables, raisins, and molasses. Taking iron-rich foods with a source of vitamin C (e.g., orange juice) enhances the absorption of iron. All of the listed foods are nutritious, but liver and orange juice are most likely to be of benefit to iron stores. (PTS:1 REF:p.914)"
        },

    let currentQuestion = 0;
    let selectedOption = null;
    let answers = Array(questions.length).fill(null);

    function loadQuestion() {
        const q = questions[currentQuestion];
        if (!q) return;

        const progress = ((currentQuestion + 1) / questions.length) * 100;
        document.getElementById('progressBar').style.width = `${progress}%`;
        document.getElementById('counter').textContent = `${currentQuestion + 1}/${questions.length}`;
        document.getElementById('questionNumber').textContent = q.id;

        document.getElementById('question').innerHTML = q.question;
        loadOptions(q);

        document.getElementById('feedback').style.display = 'none';
        document.getElementById('rationale').classList.remove('show');
        document.getElementById('cancelBtn').classList.remove('show');

        document.getElementById('prevBtn').disabled = currentQuestion === 0;
        const stored = answers[q.id - 1];
        document.getElementById('nextBtn').disabled = stored === null || stored === undefined;
        document.getElementById('nextBtn').textContent = currentQuestion >= questions.length - 1 ? 'Finish ➡️' : 'Next ➡️';
    }

    function loadOptions(q) {
        const container = document.getElementById('options');
        container.innerHTML = '';
        q.options.forEach((opt, idx) => {
            const div = document.createElement('div');
            div.className = 'option';
            div.innerHTML = `<div class="option-letter">${String.fromCharCode(65 + idx)}</div><div>${opt}</div>`;
            div.onclick = () => selectOption(idx);
            container.appendChild(div);
        });

        const saved = answers[q.id - 1];
        if (saved !== null && saved !== undefined) {
            selectOption(saved, true);
        }
    }

    function selectOption(index, fromMemory = false) {
        const q = questions[currentQuestion];
        if (!fromMemory && selectedOption !== null) return;

        if (!fromMemory) {
            selectedOption = index;
            answers[q.id - 1] = index;
        }

        highlightSelected(index, q);
        showFeedback(index, q);
        document.getElementById('nextBtn').disabled = false;
        document.getElementById('cancelBtn').classList.add('show');
    }

    function highlightSelected(index, q) {
        const opts = document.querySelectorAll('.option');
        opts.forEach((opt, i) => opt.classList.remove('correct', 'incorrect'));

        const correctIndices = Array.isArray(q.correct) ? q.correct : [q.correct];
        if (Array.isArray(q.correct)) {
            correctIndices.forEach(ci => opts[ci]?.classList.add('correct'));
            if (!correctIndices.includes(index)) {
                opts[index]?.classList.add('incorrect');
            }
        } else {
            if (index === q.correct) {
                opts[index].classList.add('correct');
            } else {
                opts[index].classList.add('incorrect');
                opts[q.correct].classList.add('correct');
            }
        }
    }

    function showFeedback(index, q) {
        const fb = document.getElementById('feedback');
        const icon = document.getElementById('feedbackIcon');
        const text = document.getElementById('feedbackText');
        const rationaleDiv = document.getElementById('rationale');
        const rationaleP = document.getElementById('rationaleText');

        const correctIndices = Array.isArray(q.correct) ? q.correct : [q.correct];
        const isCorrect = correctIndices.includes(index);

        if (isCorrect) {
            fb.className = 'feedback correct';
            icon.textContent = '✅';
            text.textContent = 'CORRECT! Well done.';
        } else {
            fb.className = 'feedback incorrect';
            icon.textContent = '❌';
            const letters = correctIndices.map(c => String.fromCharCode(65 + c)).join(', ');
            text.textContent = `INCORRECT. The correct answer(s): ${letters}`;
        }

        fb.style.display = 'flex';
        rationaleP.innerHTML = q.rationale;
        rationaleDiv.classList.add('show');
    }

    function cancelSelection() {
        const q = questions[currentQuestion];
        selectedOption = null;
        answers[q.id - 1] = null;
        document.querySelectorAll('.option').forEach(opt => opt.classList.remove('correct', 'incorrect'));
        document.getElementById('feedback').style.display = 'none';
        document.getElementById('rationale').classList.remove('show');
        document.getElementById('cancelBtn').classList.remove('show');
        document.getElementById('nextBtn').disabled = true;
    }

    function nextCard() {
        if (currentQuestion < questions.length - 1) {
            currentQuestion++;
            selectedOption = null;
            loadQuestion();
        } else {
            currentQuestion = 0;
            loadQuestion();
        }
    }

    function previousCard() {
        if (currentQuestion > 0) {
            currentQuestion--;
            const q = questions[currentQuestion];
            selectedOption = answers[q.id - 1];
            loadQuestion();
        }
    }

    // keyboard shortcuts
    document.addEventListener('keydown', function(e) {
        if (e.key >= '1' && e.key <= '4') selectOption(parseInt(e.key)-1);
        else if (e.key >= 'a' && e.key <= 'd') selectOption(e.key.charCodeAt(0)-97);
        else if (e.key >= 'A' && e.key <= 'D') selectOption(e.key.charCodeAt(0)-65);
        else if (e.key === 'ArrowLeft' && !document.getElementById('prevBtn').disabled) previousCard();
        else if (e.key === 'ArrowRight' && !document.getElementById('nextBtn').disabled) nextCard();
        else if (e.key === 'Escape' && document.getElementById('cancelBtn').classList.contains('show')) cancelSelection();
    });

    loadQuestion();
</script>
